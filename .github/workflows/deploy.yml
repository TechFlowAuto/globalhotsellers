name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Install and build
        run: |
          echo "=== INSTALLING ==="
          npm install
          
          echo "=== BUILDING ==="
          npm run build 2>&1
          
          echo "=== CHECKING ==="
          # Next.js 14+ with output: 'export' automatically creates out directory
          if [ -d "out" ]; then
            echo "Build and export successful!"
            echo "out directory contents:"
            ls -la out/
          elif [ -d ".next" ]; then
            echo "Build successful but no out directory"
            echo ".next directory exists, checking for static export..."
            # 检查是否有静态导出文件
            find .next -name "*.html" -type f | head -5
            exit 1
          else
            echo "Build failed"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4