name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install --verbose 2>&1 | tail -20
          echo "\nChecking Next.js installation..."
          ls -la node_modules/.bin/next 2>/dev/null && echo "Next.js found in node_modules" || echo "Next.js not found"
      
      - name: Build and export for GitHub Pages
        run: |
          echo "Building with Next.js..."
          # 先检查next命令是否可用
          if [ -f "node_modules/.bin/next" ]; then
            echo "Using local next command"
            ./node_modules/.bin/next --version
            ./node_modules/.bin/next build
            ./node_modules/.bin/next export
          else
            echo "Using npx next"
            npx next --version
            npx next build
            npx next export
          fi
          echo "\nBuild output:"
          ls -la out/
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4