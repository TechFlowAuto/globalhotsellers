name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Debug - Show system info
        run: |
          echo "=== System Information ==="
          echo "Node.js version: $(node --version 2>/dev/null || echo 'Not installed')"
          echo "npm version: $(npm --version 2>/dev/null || echo 'Not installed')"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "\n=== Package.json ==="
          cat package.json || echo "No package.json found"
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Install dependencies with debug
        run: |
          echo "=== Installing dependencies ==="
          npm install --verbose 2>&1 | tail -50
          echo "\n=== Checking installed packages ==="
          ls -la node_modules/.bin/ 2>/dev/null | grep -E "(next|react)" || echo "No next or react in node_modules/.bin/"
      
      - name: Build with debug
        run: |
          echo "=== Starting build ==="
          set -x  # Enable debug mode
          npm run build
          BUILD_EXIT=$?
          set +x
          echo "Build exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Build failed! Checking for errors..."
            # Check for common errors
            find . -name "*.log" -type f 2>/dev/null | xargs cat 2>/dev/null || true
            exit 1
          fi
          echo "Build successful!"
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Check build output
        run: |
          echo "=== Build output check ==="
          if [ -d "out" ]; then
            echo "Build output directory exists:"
            ls -la out/
            echo "\nFirst few files in out:"
            find out/ -type f | head -20
          else
            echo "ERROR: No 'out' directory found after build!"
            echo "Checking for alternative output:"
            ls -la | grep -E "(build|dist|public)"
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4