name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Install dependencies
        run: |
          echo "Step 1: Installing dependencies..."
          npm install
          echo "Step 2: Checking installed packages..."
          ls node_modules/.bin/ | grep -E "(next|react)" || echo "Warning: next or react not found in node_modules/.bin/"
      
      - name: Check Next.js availability
        run: |
          echo "Step 3: Checking Next.js..."
          npx next --version || echo "Next.js not available via npx"
          echo "Step 4: Checking package.json scripts..."
          cat package.json | grep -A10 '"scripts"'
      
      - name: Try alternative build command
        run: |
          echo "Step 5: Trying alternative build commands..."
          echo "5.1: Trying 'npm run export' (from package.json)..."
          npm run export || echo "'npm run export' failed"
          
          echo "\n5.2: Trying 'npx next build' directly..."
          npx next build || echo "'npx next build' failed"
          
          echo "\n5.3: Checking if out directory was created..."
          if [ -d "out" ]; then
            echo "Success! out directory exists with files:"
            ls -la out/
          else
            echo "No out directory found. Checking for build output..."
            ls -la | grep -E "(build|dist|.next)"
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact if exists
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: success()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4