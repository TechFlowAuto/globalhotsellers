name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# 必要的权限配置
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Install and build
        run: |
          echo "=== INSTALLING ==="
          npm install
          
          echo "=== BUILDING ==="
          npm run build 2>&1
          
          echo "=== CHECKING ==="
          if [ -d "out" ]; then
            echo "✅ Build and export successful!"
            echo "out directory contents:"
            ls -la out/
          else
            echo "❌ Build failed - no out directory"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4