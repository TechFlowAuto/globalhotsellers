name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"  # 使用稳定的Node 18
      
      - name: Install and build with full output
        run: |
          echo "=== FULL OUTPUT - NO FILTERING ==="
          echo "1. Current directory:"
          pwd
          ls -la
          
          echo "\n2. Node and npm versions:"
          node --version
          npm --version
          
          echo "\n3. Installing dependencies..."
          npm install 2>&1
          
          echo "\n4. Checking installed packages..."
          ls -la node_modules/.bin/ 2>/dev/null || echo "No node_modules/.bin directory"
          
          echo "\n5. Trying to build..."
          # 直接运行构建，捕获所有输出
          set -x  # 显示执行的命令
          npm run build 2>&1
          set +x
          
          echo "\n6. Build result check..."
          if [ -d ".next" ]; then
            echo "Build successful! .next directory exists."
            echo "Trying to export..."
            npx next export 2>&1 || echo "Export failed"
          else
            echo "Build failed - no .next directory"
            exit 1
          fi
          
          echo "\n7. Final check..."
          if [ -d "out" ]; then
            echo "SUCCESS: out directory created!"
            ls -la out/
          else
            echo "FAILURE: No out directory"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: success()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4