name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"  # 暂时使用20避免警告
      
      - name: Debug - Show environment
        run: |
          echo "=== DEBUG INFO ==="
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "PWD: $(pwd)"
          echo "Files:"
          ls -la
          echo "\nPackage.json:"
          cat package.json
          echo "\nNext config:"
          cat next.config.js 2>/dev/null || echo "No next.config.js"
      
      - name: Install
        run: npm install
      
      - name: Build
        run: |
          echo "=== BUILD ATTEMPT ==="
          # 尝试直接构建
          npx next build 2>&1 || echo "Next build failed"
          
          # 检查是否有.next目录
          if [ -d ".next" ]; then
            echo "\n.next directory created, trying export..."
            npx next export 2>&1 || echo "Next export failed"
          fi
          
          # 检查输出
          echo "\n=== OUTPUT CHECK ==="
          if [ -d "out" ]; then
            echo "SUCCESS: out directory exists"
            ls -la out/
          else
            echo "FAILURE: No out directory"
            echo "Checking for .next:"
            ls -la .next 2>/dev/null || echo "No .next either"
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload if out exists
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: success()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4