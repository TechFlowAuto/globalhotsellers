name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Install Next.js globally first
        run: |
          echo "=== STEP 1: Install Next.js globally ==="
          npm install -g next@14.2.5 2>&1 | tail -10
          echo "Global next version: $(next --version 2>/dev/null || echo 'Not found')"
      
      - name: Install project dependencies
        run: |
          echo "=== STEP 2: Install project dependencies ==="
          rm -rf node_modules package-lock.json 2>/dev/null || true
          npm install --force 2>&1 | tail -20
          echo "\nChecking installed packages:"
          ls node_modules/.bin/ | grep -E "(next|react)" || echo "No next or react in node_modules/.bin/"
      
      - name: Build with direct command
        run: |
          echo "=== STEP 3: Build with direct command ==="
          # 方法1: 使用全局next
          echo "Method 1: Using global next"
          next --version 2>/dev/null && next build 2>&1 | tail -20 || echo "Global next failed"
          
          # 方法2: 使用npx
          echo "\nMethod 2: Using npx"
          npx --version 2>/dev/null && npx next build 2>&1 | tail -20 || echo "npx next failed"
          
          # 方法3: 使用node_modules中的next
          echo "\nMethod 3: Using node_modules next"
          if [ -f "node_modules/.bin/next" ]; then
            ./node_modules/.bin/next --version
            ./node_modules/.bin/next build 2>&1 | tail -20
          else
            echo "node_modules/.bin/next not found"
          fi
          
          # 检查构建结果
          echo "\n=== Checking build result ==="
          if [ -d ".next" ]; then
            echo ".next directory created successfully"
            # 尝试导出
            echo "\nExporting to static files..."
            next export 2>&1 | tail -20 || npx next export 2>&1 | tail -20 || ./node_modules/.bin/next export 2>&1 | tail -20 || echo "Export failed"
          else
            echo "ERROR: .next directory not created"
            exit 1
          fi
          
          # 检查最终输出
          echo "\n=== Final output check ==="
          if [ -d "out" ]; then
            echo "SUCCESS: out directory created with files:"
            ls -la out/
          else
            echo "ERROR: No out directory"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SITE_URL: https://globalhotsellers.net
          NEXT_PUBLIC_SITE_NAME: GlobalHotSellers
          NEXT_PUBLIC_SITE_DESCRIPTION: Discover What's Hot Worldwide
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4